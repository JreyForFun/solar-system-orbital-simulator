<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Orbital Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="solar-canvas"></canvas>

     <!-- Title Panel -->
    <div id="title-panel">
      <h1>Solar System</h1>
      <div id="controls">
        <span class="ctrl-label">Speed</span>
        <input type="range" id="speed-slider" min="0" max="10" step="0.1" value="1"/>
        <span id="speed-readout">1.0x</span>
      </div>
      <p class="hint"Click a planet to inspect it></p>
    </div>

    <!-- Planet info panel -->
    <div id="info-panel" class="hidden">
      <button id="close-btn">✕</button>
      <h2 id="planet-name"></h2>
      <div id="planet-facts"></div>
    </div>

  <script src="script.js"></script>
</body>
</html>
